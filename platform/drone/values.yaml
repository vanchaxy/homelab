drone:
  env:
    DRONE_SERVER_HOST: drone-dev.ivanchenko.io
    DRONE_SERVER_PROTO: https
    DRONE_USER_CREATE: username:vanchaxy,admin:true
    DRONE_USER_FILTER: vanchaxy

  extraSecretNamesForEnvFrom:
    - drone-secret

  ingress:
    enabled: true

    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/ssl-passthrough: "true"

    hosts:
      - host: drone-dev.ivanchenko.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: drone-tls
        hosts:
          - drone-dev.ivanchenko.io

drone-runner-kube:
  rbac:
    buildNamespaces:
      - drone

  env:
    DRONE_RPC_HOST: drone:8080
    DRONE_RPC_PROTO: http
    DRONE_NAMESPACE_DEFAULT: drone

  extraSecretNamesForEnvFrom:
    - drone-secret

  ingress:
    enabled: true

    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/ssl-passthrough: "true"

    hosts:
      - host: drone-runner-dev.ivanchenko.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: drone-runner-tls
        hosts:
          - drone-runner-dev.ivanchenko.io