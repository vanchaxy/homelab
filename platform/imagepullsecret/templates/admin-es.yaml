apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: image-pull-secret-src
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: {{` "{{ .config }}" `}}
  data:
    - secretKey: config
      remoteRef:
        key: registry
        property: config