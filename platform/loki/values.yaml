loki:
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: 'filesystem'

  singleBinary:
    replicas: 1
    persistence:
      size: 10Gi

  monitoring:
    lokiCanary:
      enabled: false

  test:
    enabled: false

  fluent-bit:
    loki:
      serviceName: loki
    config:
      memBufLimit: "50MB"