adguard-home:
  controllers:
    main:
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: adguard/adguardhome
            tag: v0.107.77@sha256:e6f2b8bcda06064ab055b44933a4f0e983c35558b9cdb8d2e7ab1efcee36d890

  service:
    main:
      controller: main
      type: LoadBalancer
      loadBalancerIP: 192.168.50.250
      ports:
        http:
          port: 3000
        dns-tcp:
          port: 53
        dns-udp:
          protocol: UDP
          port: 53
        dns-over-tls:
          port: 853
        dns-over-quic:
          protocol: UDP
          port: 784

  route:
    main:
      hostnames:
        - adguard.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      rules:
        - backendRefs:
            - identifier: main
              port: 3000

  persistence:
    config:
      enabled: true
      suffix: config
      storageClass: longhorn-ssd
      size: 10Gi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          main:
            - path: /opt/adguardhome/conf
              subPath: conf
            - path: /opt/adguardhome/work
              subPath: work
