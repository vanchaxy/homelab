victoria-metrics-k8s-stack:
  victoria-metrics-operator:
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: true

  vmsingle:
    spec:
      retentionPeriod: "30d"
      storage:
        resources:
          requests:
            storage: 20Gi
      useDefaultResources: false
      resources:
        requests:
          cpu: 200m
          memory: 500Mi
        limits:
          memory: 2Gi

  vmagent:
    spec:
      useDefaultResources: false
      resources:
        requests:
          cpu: 50m
          memory: 200Mi
        limits:
          memory: 500Mi

  vmalert:
    spec:
      useDefaultResources: false
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          memory: 500Mi

  alertmanager:
    spec:
      useDefaultResources: false
      resources:
        requests:
          cpu: 20m
          memory: 50Mi
        limits:
          memory: 200Mi

  grafana:
    enabled: false
    forceDeployDatasource: true

  defaultDashboards:
    grafanaOperator:
      enabled: true
      spec:
        allowCrossNamespaceImport: true

  defaultDatasources:
    grafanaOperator:
      enabled: true
      spec:
        allowCrossNamespaceImport: true

  defaultRules:
    rules:
      # Upstream KubeJobFailed fires forever (`kube_job_failed > 0`)
      # because failed Jobs are never garbage-collected unless
      # ttlSecondsAfterFinished is set. Custom rule in
      # templates/vmrule-kube-job-failed.yaml uses changes() so it
      # fires once per new failure and stops after 6h.
      KubeJobFailed:
        create: false
