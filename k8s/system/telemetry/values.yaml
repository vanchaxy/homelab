victoria-metrics-k8s-stack:
  victoria-metrics-operator:
    # Pinned back from chart-default v0.71.0: that build's /metrics endpoint
    # deadlocks (never returns), so vmagent can't scrape the operator and
    # TargetDown/TooManyScrapeErrors/TooManyLogs fire. Remove once upstream
    # ships a fix newer than v0.71.0.
    image:
      tag: v0.70.1
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: true

  vmsingle:
    spec:
      retentionPeriod: "30d"
      storage:
        resources:
          requests:
            storage: 20Gi
      useDefaultResources: false
      resources:
        requests:
          cpu: 200m
          memory: 500Mi
        limits:
          memory: 2Gi

  vmagent:
    spec:
      useDefaultResources: false
      resources:
        requests:
          cpu: 50m
          memory: 200Mi
        limits:
          memory: 500Mi

  vmalert:
    spec:
      useDefaultResources: false
      resources:
        requests:
          cpu: 50m
          memory: 100Mi
        limits:
          memory: 500Mi

  alertmanager:
    spec:
      useDefaultResources: false
      disableNamespaceMatcher: true
      resources:
        requests:
          cpu: 20m
          memory: 50Mi
        limits:
          memory: 200Mi

  grafana:
    enabled: false
    forceDeployDatasource: true

  defaultDashboards:
    grafanaOperator:
      enabled: true
      spec:
        allowCrossNamespaceImport: true

  defaultDatasources:
    grafanaOperator:
      enabled: true
      spec:
        allowCrossNamespaceImport: true

  defaultRules:
    rules:
      # Upstream KubeJobFailed fires forever (`kube_job_failed > 0`)
      # because failed Jobs are never garbage-collected unless
      # ttlSecondsAfterFinished is set. Custom rule in
      # templates/vmrule-kube-job-failed.yaml uses changes() so it
      # fires once per new failure and stops after 6h.
      KubeJobFailed:
        create: false
      RecordingRulesNoData:
        spec:
          expr: sum(vmalert_recording_rules_last_evaluation_samples{group!="kube-scheduler.rules"}) without(id) < 1

  # kube-scheduler and kube-controller-manager serve metrics with a
  # self-signed cert valid only for 127.0.0.1/localhost (Talos default),
  # while we scrape them on the node IP. Skip cert verification — the
  # endpoint is still authenticated via the serviceaccount bearer token.
  # (bind-address: 0.0.0.0 is set on both in the Talos machine config.)
  kubeScheduler:
    vmScrape:
      spec:
        endpoints:
          - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            port: http-metrics
            scheme: https
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true

  # Talos runs etcd as a host service, not a Kubernetes pod, so the
  # chart's kube-etcd Service selector (component: etcd) matches nothing
  # and the scrape pool has 0 targets — firing ScrapePoolHasNoTargets.
  # etcd metrics aren't exposed to the pod network on Talos by default,
  # so disable the scrape rather than ship an empty pool.
  kubeEtcd:
    enabled: false

  kubeControllerManager:
    vmScrape:
      spec:
        endpoints:
          - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            port: http-metrics
            scheme: https
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true

  # The chart's kubelet scrape labelmaps every node label onto every
  # kubelet/cAdvisor series. Our nodes carry the AMD GPU node-labeller's
  # per-value labels (beta.amd.com/gpu.cu-count.11=1, ...) plus Talos
  # extension labels, which pushes wide series like kubernetes_build_info
  # and container_blkio_device_usage_total past -maxLabelsPerTimeseries=40.
  # vmsingle then rejects them (RowsRejectedOnIngestion: too_many_labels)
  # and logs a warning per drop (TooManyLogs). These node labels are noise
  # on per-container metrics, so drop them after the labelmap — this also
  # cuts cardinality across all kubelet series. Reproduces the chart's
  # default relabelConfigs (list values are replaced, not merged).
  kubelet:
    vmScrape:
      spec:
        relabelConfigs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - sourceLabels: [__metrics_path__]
            targetLabel: metrics_path
          - targetLabel: job
            replacement: kubelet
          - action: labeldrop
            regex: (amd_com_gpu_.*|beta_amd_com_gpu_.*|extensions_talos_dev_.*)

helpers:
  infisicalSecrets:
    - name: alertmanager-secrets
      infisical:
        path: "/monitoring/grafana-alerting"
