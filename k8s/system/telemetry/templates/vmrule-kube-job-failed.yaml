apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: kube-job-failed-once
  namespace: telemetry
spec:
  groups:
    - name: kube-job-failed-once
      rules:
        # Fires only when kube_job_failed changes within the last 6h
        # (i.e. when a Job newly fails). Auto-clears 6h after the last
        # failure event even if the Failed Job object still exists.
        - alert: KubeJobFailed
          expr: |
            changes(kube_job_failed{job="kube-state-metrics"}[6h]) > 0
          labels:
            severity: warning
          annotations:
            summary: {{ `'Job {{ $labels.namespace }}/{{ $labels.job_name }} failed'` }}
            description: 'A new Job failure was recorded in the last 6h. After investigating, delete the Job object so it does not accumulate in etcd.'
