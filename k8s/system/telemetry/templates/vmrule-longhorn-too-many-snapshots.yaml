apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: longhorn-too-many-snapshots
  namespace: telemetry
spec:
  groups:
    - name: longhorn-too-many-snapshots
      rules:
        - alert: LonghornVolumeTooManySnapshots
          expr: |
            count by (volume) (longhorn_snapshot_actual_size_bytes) > 100
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: {{ `'Longhorn volume {{ $labels.volume }} has {{ $value }} snapshots'` }}
            description: 'Approaching the 250-snapshot cap, at which clones/snapshots start failing. Usually a VolSync clone or continuous-backup leak on a detached volume. Check the ReplicationSource and prune stale snapshots.'
