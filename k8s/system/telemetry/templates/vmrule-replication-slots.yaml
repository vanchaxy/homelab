apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: postgres-replication-slots
  namespace: telemetry
spec:
  groups:
    - name: postgres-replication-slots
      rules:
        - alert: PostgresReplicationSlotInactive
          expr: |
            cnpg_pg_replication_slots_active == 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: {{ `'CNPG slot {{ $labels.slot_name }} on {{ $labels.namespace }}/{{ $labels.pod }} is inactive'` }}
            description: 'No consumer connected for >1h. Slot is retaining WAL. Investigate before max_slot_wal_keep_size invalidates it.'
        - alert: PostgresReplicationSlotLagHigh
          expr: |
            cnpg_pg_replication_slots_pg_wal_lsn_diff > 6 * 1024 * 1024 * 1024
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: {{ `'CNPG slot {{ $labels.slot_name }} on {{ $labels.namespace }}/{{ $labels.pod }} retaining >6GB of WAL'` }}
            description: 'Within 2 GB of max_slot_wal_keep_size=8GB. The consumer (e.g. Electric) must catch up or be reset; otherwise the slot will be invalidated and need a fresh sync.'
