apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanagerConfig
metadata:
  name: alerting-routing
  namespace: telemetry
spec:
  route:
    receiver: telegram
    group_by: [alertname]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: healthchecks
        matchers:
          - alertname="Watchdog"
        group_wait: 0s
        group_interval: 1m
        repeat_interval: 5m
      - receiver: blackhole
        matchers:
          - alertname="InfoInhibitor"
  receivers:
    - name: telegram
      telegram_configs:
        - bot_token:
            name: alertmanager-secrets
            key: TELEGRAM_BOTTOKEN
          chat_id: 236266523
          parse_mode: MarkdownV2
          send_resolved: true
          disable_notifications: false
          # The message is an Alertmanager (not Helm) template, so it is wrapped
          # in a Helm raw string to pass through verbatim. __BT__ stands in for
          # backtick (which would close the raw string) and is replaced below.
          # MarkdownV2 needs every reserved char escaped in dynamic text or
          # Telegram 400s and the alert is never delivered: $esc escapes body
          # text via reReplaceAll.
          message: |-
{{ `
{{- if eq .Status "firing" -}}
{{- if eq .CommonLabels.severity "critical" }}🔥 *CRITICAL*
{{- else if eq .CommonLabels.severity "warning" }}⚠️ *WARNING*
{{- else }}ℹ️ *FIRING*{{ end }} · {{ .Alerts.Firing | len }} firing
{{- else -}}
✅ *RESOLVED* · {{ .Alerts.Resolved | len }} resolved
{{- end }}
{{ range .Alerts }}
{{- $esc := "[_*\\[\\]()~__BT__>#+\\-=|{}.!\\\\]" -}}
{{- if eq .Status "resolved" -}}
✅ *{{ reReplaceAll $esc "\\$0" .Labels.alertname }}*{{ with .Labels.namespace }} · __BT__{{ . }}__BT__{{ end }}
{{ else -}}
{{ if eq .Labels.severity "critical" }}🔥{{ else if eq .Labels.severity "warning" }}⚠️{{ else }}ℹ️{{ end }} *{{ reReplaceAll $esc "\\$0" .Labels.alertname }}*
{{- with .Annotations.summary }}
{{ reReplaceAll $esc "\\$0" . }}{{ end }}
{{- with .Annotations.description }}
{{ reReplaceAll $esc "\\$0" . }}{{ end }}
__BT____BT____BT__
{{ range .Labels.SortedPairs }}{{ if not (match "^(alertname|alertgroup|severity|condition|prometheus|endpoint|instance|job|service)$" .Name) }}{{ .Name }} = {{ .Value }}
{{ end }}{{ end -}}
__BT____BT____BT__
{{ end -}}
{{ end }}
` | replace "__BT__" "`" | trim | indent 12 }}
    - name: healthchecks
      webhook_configs:
        - url_secret:
            name: alertmanager-secrets
            key: HEALTHCHECKS_URL
          send_resolved: false
    - name: blackhole
  inhibit_rules:
    - source_matchers: ['severity="critical"']
      target_matchers: ['severity=~"warning|info"']
      equal: [namespace, alertname]
    - source_matchers: ['severity="warning"']
      target_matchers: ['severity="info"']
      equal: [namespace, alertname]
    - source_matchers: ['alertname="InfoInhibitor"']
      target_matchers: ['severity="info"']
      equal: [namespace]
