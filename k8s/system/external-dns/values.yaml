external-dns:
  provider:
    name: cloudflare
  txtOwnerId: homelab
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-api-token
          key: api-token
  extraArgs:
    - --annotation-filter=external-dns.alpha.kubernetes.io/exclude notin (true)
    - --gateway-name=public-gw
#    - --min-ttl=60s
  sources:
    - service
    - gateway-httproute
  policy: sync

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

internal-external-dns:
  fullnameOverride: internal-external-dns
  annotationPrefix: "internal.ivanchenko.io/"
  provider:
    name: webhook
    webhook:
      image:
        repository: ghcr.io/muhlba91/external-dns-provider-adguard
        tag: v11.1.1@sha256:b3dfe851982b59a36bf2e15f42ca4015b7ef39ddf7a808c39a855a05a61b5892
      service:
        port: 8888
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 10
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 10
        timeoutSeconds: 5
      env:
        - name: ADGUARD_URL
          valueFrom:
            secretKeyRef:
              name: adguard-configuration
              key: ADGUARD_URL
        - name: ADGUARD_USER
          valueFrom:
            secretKeyRef:
              name: adguard-configuration
              key: ADGUARD_USER
        - name: ADGUARD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: adguard-configuration
              key: ADGUARD_PASSWORD
        - name: LOG_LEVEL
          value: debug
        - name: DRY_RUN
          value: "false"
  txtOwnerId: internal-homelab
  extraArgs:
    - --annotation-filter=external-dns.alpha.kubernetes.io/exclude notin (true)
    - --gateway-name=internal-gw
#    - --min-ttl=60s
  sources:
    - service
    - gateway-httproute
  policy: sync

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

helpers:
  infisicalSecrets:
    - name: cloudflare-api-token
      infisical:
        path: "/cloudflare"
    - name: adguard-configuration
      infisical:
        path: "/adguard"
