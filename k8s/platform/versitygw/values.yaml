versitygw:
  image:
    repository: ghcr.io/versity/versitygw
    tag: v1.5.0@sha256:7d56e0a6c246f00e2385ba4fe84065981959be1d822648f88a155c82e0e0652d

  auth:
    existingSecret: versitygw

  gateway:
    virtualDomain: s3.ivanchenko.io

  httpRoute:
    enabled: true
    parentRefs:
      - name: internal-gw
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - s3.ivanchenko.io
      - '*.s3.ivanchenko.io'

  admin:
    enabled: true
    httpRoute:
      enabled: true
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      hostnames:
        - s3-admin.ivanchenko.io

  webui:
    enabled: true
    apiGateways:
      - https://s3.ivanchenko.io
    adminGateways:
      - https://s3-admin.ivanchenko.io
    httpRoute:
      enabled: true
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      hostnames:
        - versitygw.ivanchenko.io

helpers:
  infisicalSecrets:
    - name: versitygw
      infisical:
        path: "/versitygw"
  backups:
    - enabled: true
      pvcName: versitygw-data
      resticRepoSuffix: versitygw
