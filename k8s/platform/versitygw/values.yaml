versitygw:
  image:
    repository: ghcr.io/versity/versitygw
    tag: v1.6.0@sha256:d6ec798f66cac65bd5813d94fbe51edf658120d749c1cf5b572b63a2334c4d81

  auth:
    existingSecret: versitygw

  gateway:
    virtualDomain: s3.ivanchenko.io

  httpRoute:
    enabled: true
    parentRefs:
      - name: internal-gw
        namespace: envoy-gateway
        sectionName: https
    hostnames:
      - s3.ivanchenko.io
      - '*.s3.ivanchenko.io'

  admin:
    enabled: true
    httpRoute:
      enabled: true
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      hostnames:
        - s3-admin.ivanchenko.io

  webui:
    enabled: true
    apiGateways:
      - https://s3.ivanchenko.io
    adminGateways:
      - https://s3-admin.ivanchenko.io
    httpRoute:
      enabled: true
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      hostnames:
        - versitygw.ivanchenko.io

helpers:
  infisicalSecrets:
    - name: versitygw
      infisical:
        path: "/versitygw"
  backups:
    - enabled: true
      pvcName: versitygw-data
      resticRepoSuffix: versitygw
