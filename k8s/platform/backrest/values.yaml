backrest:
  controllers:
    main:
      containers:
        main:
          image:
            repository: garethgeorge/backrest
            tag: v1.12.1@sha256:f4d34bd6fa985d13bdb6c01c5d8727e07708899afa9567d800808357d77b9fb0
          env:
            BACKREST_DATA: /data
            BACKREST_CONFIG: /config/config.json
            XDG_CACHE_HOME: /cache

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 9898

  route:
    main:
      hostnames:
        - backrest.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      rules:
        - backendRefs:
            - identifier: main
          timeouts:
            request: 3600s

  persistence:
    config:
      enabled: true
      suffix: config
      storageClass: longhorn-ssd
      size: 2Gi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          main:
            - path: /data
              subPath: data
            - path: /config
              subPath: config
            - path: /cache
              subPath: cache

backrest-volsync-operator:
  image:
    repository: ghcr.io/jogotcha/backrest-volsync-operator
    tag: 0.3.0@sha256:93580e477a4d37b3f319903b4f1ff073384d0e13178f3acd3df00a1f0cb5880a

  operatorConfig:
    create: true
    bindingGeneration: All
    defaultBackrest:
      url: http://backrest:9898/
    bindingGenerationKinds:
      - ReplicationSource

helpers:
  backups:
    - pvcName: backrest-config
      resticRepoSuffix: backrest
