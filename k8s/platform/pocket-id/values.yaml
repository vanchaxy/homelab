pocket-id:
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/pocket-id/pocket-id
            tag: v2.4.0@sha256:3e790c5d4fd82ff276b1c2bc3242be9da13cff204a2b937768ea1eba1e892571
          env:
            APP_URL: https://id.ivanchenko.io
            TRUST_PROXY: true
          envFrom:
            - secretRef:
                name: pocket-id
  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 1411

  route:
    main:
      hostnames:
        - id.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https

  persistence:
    config:
      enabled: true
      suffix: config
      storageClass: longhorn-ssd
      size: 1Gi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          main:
            - path: /app/data

helpers:
  infisicalSecrets:
    - name: pocket-id
      infisical:
        path: "/pocket-id"
  backups:
    - enabled: true
      pvcName: pocket-id-config
      resticRepoSuffix: pocket-id
      moverSecurityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
