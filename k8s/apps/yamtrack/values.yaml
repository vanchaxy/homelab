yamtrack:
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/fuzzygrim/yamtrack
            tag: 0.25.3@sha256:00acf008bca8171226063bc0f8f08ef7ffe24a10bcebf8676cce335ce312c307
          env:
            REDIS_URL: redis://yamtrack-redis-headless:6379
            SOCIAL_PROVIDERS: allauth.socialaccount.providers.openid_connect
            SOCIALACCOUNT_ONLY: True
            REDIRECT_LOGIN_TO_SSO: True
          envFrom:
            - secretRef:
                name: yamtrack-secret
  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 8000

  route:
    main:
      hostnames:
        - yamtrack.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https

  persistence:
    data:
      enabled: true
      suffix: data
      storageClass: longhorn-ssd
      size: 5Gi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          main:
            - path: /yamtrack/db

redis:
  enabled: true
  auth:
    enabled: false
    username: ""
  master:
    persistence:
      enabled: true
    resources:
      limits:
        cpu: null
  replica:
    replicaCount: 0
    resources:
      limits:
        cpu: null

helpers:
  infisicalSecrets:
    - name: yamtrack-secret
      namespace: yamtrack
      infisical:
        path: "/yamtrack"
  backups:
    - pvcName: yamtrack-data
      resticRepoSuffix: yamtrack
