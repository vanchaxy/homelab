immich:
  controllers:
    main:
      containers:
        main:
          env:
            DB_HOSTNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: host
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-user
                  key: username
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-app
                  key: dbname
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-postgres-user
                  key: password

  immich:
    persistence:
      library:
        existingClaim: photo-library

  valkey:
    enabled: true
    persistence:
      data:
        enabled: true
        size: 1Gi
        storageClass: longhorn-ssd
        accessMode: ReadWriteOnce

  server:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
    route:
      main:
        hostnames:
          - immich.ivanchenko.io
        parentRefs:
          - name: internal-gw
            namespace: envoy-gateway
            sectionName: https

  machine-learning:
    enabled: true
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3

immichframe:
  fullnameOverride: immich-frame
  controllers:
    frame:
      containers:
        main:
          image:
            repository: ghcr.io/immichframe/immichframe
            tag: v1.0.33.0@sha256:1680d2f63a89fa0db6e5a7c5c497bed27a47f314efe18e1f11cff1dea1910f57
          env:
            TZ: Europe/Berlin
  service:
    frame:
      controller: frame
      ports:
        http:
          port: 8080
  route:
    main:
      hostnames:
        - immichframe.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      rules:
        - backendRefs:
            - identifier: frame
              port: 8080
  persistence:
    config:
      enabled: true
      type: secret
      name: immichframe-config
      globalMounts:
        - path: /app/Config/Settings.yml
          subPath: Settings.yml
          readOnly: true

helpers:
  infisicalSecrets:
    - name: immich-postgres-user
      infisical:
        path: "/immich/postgres-user"
    - name: immichframe-config
      infisical:
        path: "/immichframe"
      template:
        data:
          Settings.yml: |
            General:
              DownloadImages: false
              RenewImagesDuration: 30
            Interval: 30
            TransitionDuration: 2
            Layout: splitview
            ShowClock: true
            ClockFormat: HH:mm
            ShowProgressBar: true
            ShowPhotoDate: true
            ShowImageLocation: true
            ShowAlbumName: true
            Language: en
            UnitSystem: metric
            WeatherApiKey: "{{ .weatherApiKey.Value }}"
            WeatherLatLong: "50.4501,30.5234"
            ShowWeatherDescription: true
            Webcalendars:
              - "{{ .calendarUrl.Value }}"
            Accounts:
              - ImmichServerUrl: http://immich-server:2283
                ApiKey: "{{ .apiKey.Value }}"
                ShowMemories: false
                ShowFavorites: false
                ShowArchived: false
                Albums:
                  - f37675fe-3813-4def-bfc0-aa913590a7e7
                  - 94a787f3-515f-4dd1-9a4f-4b3114e1ef2d
  backups:
    - pvcName: photo-library
      resticRepoSuffix: photo-library
      schedule: "0 0 * * *"
      # 300 Gi PVC — Longhorn full Clone failed once in March and never
      # retried. Use Snapshot (thin CoW) instead so the backup PVC is
      # ready instantly and we don't tie up 300 GB of storage per cycle.
      copyMethod: Snapshot
    - pvcName: immich-postgres-1
      resticRepoSuffix: immich/postgres
      schedule: "0 0 * * *"
      moverSecurityContext:
        fsGroup: 26
        runAsGroup: 26
        runAsNonRoot: true
        runAsUser: 26
