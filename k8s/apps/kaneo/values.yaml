kaneo:
  controllers:
    api:
      containers:
        main:
          image:
            repository: ghcr.io/usekaneo/api
            tag: 2.6.9@sha256:60869aab812caea6f945f08dda575ca7d513edbfad3a29bccbe1f3e6a9690beb
          envFrom:
            - secretRef:
                name: kaneo-s3
          env:
            KANEO_CLIENT_URL: "https://kaneo.ivanchenko.io"
            KANEO_API_URL: "https://kaneo.ivanchenko.io"
            DISABLE_GUEST_ACCESS: 'true'
            DISABLE_REGISTRATION: 'true'
            DATABASE_URL:
              valueFrom:
                secretKeyRef:
                  name: kaneo-secret
                  key: dburi
            AUTH_SECRET:
              valueFrom:
                secretKeyRef:
                  name: kaneo-secret
                  key: AUTH_SECRET
            CUSTOM_OAUTH_CLIENT_ID: kaneo
            CUSTOM_OAUTH_CLIENT_SECRET:
              valueFrom:
                secretKeyRef:
                  name: kaneo-secret
                  key: CUSTOM_OAUTH_CLIENT_SECRET
            CUSTOM_OAUTH_DISCOVERY_URL: https://id.ivanchenko.io/.well-known/openid-configuration
            S3_ENDPOINT: https://s3.ivanchenko.io
            S3_BUCKET: kaneo
            

    web:
      containers:
        main:
          image:
            repository: ghcr.io/usekaneo/web
            tag: 2.9.0@sha256:6d8b268654043ebd7b36fb94ee16e938c75152f7d89c5e93de945ae2a5d29d80
          env:
            KANEO_API_URL: "https://kaneo.ivanchenko.io"
            KANEO_CLIENT_URL: "https://kaneo.ivanchenko.io"

  service:
    api:
      controller: api
      ports:
        http:
          port: 1337

    web:
      controller: web
      ports:
        http:
          port: 5173

  route:
    main:
      hostnames:
        - kaneo.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: kaneo-web
              port: 5173
        - matches:
            - path:
                type: PathPrefix
                value: /api/
          backendRefs:
            - name: kaneo-api
              port: 1337

helpers:
  infisicalSecrets:
    - name: kaneo-secret
      type: kubernetes.io/basic-auth
      infisical:
        path: "/kaneo"
    - name: kaneo-s3
      namespace: kaneo
      infisical:
        path: "/versitygw"
      template:
        data:
          S3_ACCESS_KEY_ID: "{{ .rootAccessKeyId.Value }}"
          S3_SECRET_ACCESS_KEY: "{{ .rootSecretAccessKey.Value }}"
  backups:
    - pvcName: kaneo-postgres-1
      resticRepoSuffix: kaneo/postgres
      moverSecurityContext:
        fsGroup: 26
        runAsGroup: 26
        runAsNonRoot: true
        runAsUser: 26
