toloka-torznab:
  controllers:
    main:
      pod:
        imagePullSecrets:
          - name: ghcr-login-secret
      containers:
        main:
          image:
            repository: ghcr.io/vanchaxy/toloka-indexer
            tag: sha-5939c0d
          envFrom:
            - secretRef:
                name: toloka-torznab-secret
    electric:
      containers:
        main:
          image:
            repository: electricsql/electric
            tag: 1.7.8@sha256:9f151b2f862dc6d0f58a8993d062cf8563a976a4acd769e7f59dd84de7a2928e
          env:
            ELECTRIC_INSECURE: 'true'
            ELECTRIC_MANUAL_TABLE_PUBLISHING: 'true'
            ELECTRIC_STORAGE_DIR: '/persistent'
            DATABASE_URL:
              valueFrom:
                secretKeyRef:
                  name: toloka-torznab-secret
                  key: ELECTRIC_DATABASE_URL

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 8000
    electric:
      controller: electric
      type: ClusterIP
      ports:
        http:
          port: 3000

  route:
    main:
      hostnames:
        - toloka-torznab-api.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      rules:
        - backendRefs:
            - identifier: main
    electric:
      hostnames:
        - toloka-torznab-electric.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https
      rules:
        - backendRefs:
            - identifier: electric

  persistence:
    electric:
      enabled: true
      suffix: electric
      storageClass: longhorn-ssd
      size: 5Gi
      accessMode: ReadWriteOnce
      advancedMounts:
        electric:
          main:
            - path: /persistent

helpers:
  ghcrSecret:
    enabled: true
  infisicalSecrets:
    - name: toloka-torznab-secret
      type: kubernetes.io/basic-auth
      infisical:
        path: "/toloka-torznab"
  backups:
    - pvcName: toloka-torznab-postgres-1
      resticRepoSuffix: toloka-torznab/postgres
      moverSecurityContext:
        fsGroup: 26
        runAsGroup: 26
        runAsNonRoot: true
        runAsUser: 26
    - pvcName: toloka-torznab-electric
      resticRepoSuffix: toloka-torznab/electric
      unlock: "2026-07-17"
