apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: toloka-torznab-postgres
spec:
  imageName: 'ghcr.io/cloudnative-pg/postgresql:18.3-minimal-trixie'
  instances: 1
  bootstrap:
    initdb:
      database: toloka
      owner: toloka
      secret:
        name: toloka-torznab-secret
  postgresql:
    parameters:
      wal_level: logical
      max_wal_senders: "10"
      max_replication_slots: "10"
  managed:
    roles:
      - name: toloka
        ensure: present
        login: true
        createrole: true
        replication: true
        passwordSecret:
          name: toloka-torznab-secret
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 30Gi
      storageClassName: longhorn-ssd
