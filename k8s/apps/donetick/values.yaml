donetick:
  controllers:
    main:
      containers:
        main:
          image:
            repository: donetick/donetick
            tag: v0.1.75@sha256:5c207a86e5425052e9ffe5286f96f71babfe57337760d303a5fb56a856790d11
          env:
            DT_ENV: selfhosted
          envFrom:
            - secretRef:
                name: donetick-oauth
            - secretRef:
                name: donetick-s3

  configMaps:
    config:
      enabled: true
      data:
        selfhosted.yaml: |
          name: "selfhosted"

          is_done_tick_dot_com: false
          is_user_creation_disabled: false

          database:
            type: "sqlite"
            migration: true

          jwt:
            session_time: 168h
            max_refresh: 1440h

          server:
            port: 2021
            read_timeout: 10s
            write_timeout: 10s
            rate_period: 60s
            rate_limit: 300
            cors_allow_origins:
              - "https://donetick.ivanchenko.io"
              - "https://localhost"
              - "http://localhost"
              - "capacitor://localhost"
            serve_frontend: true

          logging:
            level: "info"
            encoding: "json"
            development: false

          scheduler_jobs:
            due_job: 30m
            overdue_job: 3h
            pre_due_job: 3h

          oauth2:
            client_id: "donetick"
            auth_url: "https://id.ivanchenko.io/authorize"
            token_url: "https://id.ivanchenko.io/api/oidc/token"
            user_info_url: "https://id.ivanchenko.io/api/oidc/userinfo"
            redirect_url: "https://donetick.ivanchenko.io/auth/oauth2"
            name: "Pocket ID"

          storage:
            storage_type: remote
            bucket_name: donetick
            region: us-east-1
            base_path: assets
            endpoint: "https://s3.ivanchenko.io"
            max_user_storage: 1073741824
            max_file_size: 33554432

          realtime:
            enabled: true
            sse_enabled: true
            heartbeat_interval: 60s
            connection_timeout: 120s
            max_connections: 1000
            max_connections_per_user: 5
            event_queue_size: 2048
            cleanup_interval: 2m
            stale_threshold: 5m
            enable_compression: true
            enable_stats: true
            allowed_origins:
              - "*"

  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 2021

  route:
    main:
      hostnames:
        - donetick.ivanchenko.io
      parentRefs:
        - name: internal-gw
          namespace: envoy-gateway
          sectionName: https

  persistence:
    data:
      enabled: true
      suffix: data
      storageClass: longhorn-ssd
      size: 1Gi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          main:
            - path: /donetick-data
              subPath: data
    config:
      enabled: true
      type: configMap
      identifier: config
      advancedMounts:
        main:
          main:
            - path: /config/selfhosted.yaml
              subPath: selfhosted.yaml
              readOnly: true

helpers:
  infisicalSecrets:
    - name: donetick-oauth
      namespace: donetick
      infisical:
        path: "/donetick/oauth"
    - name: donetick-s3
      namespace: donetick
      infisical:
        path: "/versitygw"
      template:
        data:
          DT_STORAGE_ACCESS_KEY: "{{ .rootAccessKeyId.Value }}"
          DT_STORAGE_SECRET_KEY: "{{ .rootSecretAccessKey.Value }}"
  backups:
    - enabled: true
      pvcName: donetick-data
      resticRepoSuffix: donetick
