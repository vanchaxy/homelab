apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: search
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: media-prowlarr
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: media-sonarr
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: media-radarr
  timeout:
    http:
      requestTimeout: 100s
