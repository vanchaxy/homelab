necesse:
  controllers:
    main:
      replicas: null
      containers:
        main:
          image:
            repository: brammys/necesse-server
            tag: latest@sha256:af639037cc16d75a90097939544ad508ac47b8799b8b626e7bcb0c2b4399ce64
          env:
            OWNER: vanchaxy
            GIVE_CLIENTS_POWER: 1
            PAUSE: 1

  service:
    main:
      controller: main
      type: LoadBalancer
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "necesse.ivanchenko.io"
      ports:
        game:
          port: 14159
          protocol: UDP

  persistence:
    config:
      enabled: true
      suffix: config
      storageClass: longhorn-ssd
      size: 5Gi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          main:
            - path: /necesse/saves
helpers:
  backups:
    - enabled: false
      pvcName: necesse-config
      resticRepoSuffix: necesse
