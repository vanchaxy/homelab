necesse:
  controllers:
    main:
      replicas: 0
      containers:
        main:
          image:
            repository: brammys/necesse-server
            tag: latest@sha256:792cabbc429364cc95d1fb7cdf46416c8b40e5c4b7fdf07aacc166268db4c4f9
          env:
            OWNER: vanchaxy
            GIVE_CLIENTS_POWER: 1
            PAUSE: 1

  service:
    main:
      controller: main
      type: LoadBalancer
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "necesse.ivanchenko.io"
      ports:
        game:
          port: 14159
          protocol: UDP

  persistence:
    config:
      enabled: true
      suffix: config
      storageClass: longhorn-ssd
      size: 5Gi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          main:
            - path: /necesse/saves
helpers:
  backups:
    - enabled: false
      pvcName: necesse-config
      resticRepoSuffix: necesse
