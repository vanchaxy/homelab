metal:
  children:
    metal_p:
      hosts:
        metal0:
          ansible_host: 192.168.1.231
          master: false
          region: home
          disks_config:
            - name: kingston-ssd
              path: /mnt/kingston-ssd
              allowScheduling: true
              storageReserved: 0
              tags:
                - ssd
            - name: easystore-hdd
              path: /mnt/easystore-hdd
              allowScheduling: true
              storageReserved: 0
              tags:
                - hdd
