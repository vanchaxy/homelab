apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: registry-admin-secret
  labels:
    argocd.argoproj.io/secret-type: repository
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    template:
      engineVersion: v2
      data:
        name: registry
        url: registry.ivanchenko.io
        enableOCI: "true"
        type: helm
        username: admin
        password: {{` "{{ .password }}" `}}
  data:
    - secretKey: password
      remoteRef:
        key: registry
        property: password