apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    template:
      engineVersion: v2
      data:
        admin.password: {{` "{{ .admin_password }}" `}}
        admin.passwordMtime: {{` "{{ .admin_passwordMtime }}" `}}
        server.secretkey: {{` "{{ .server_secretkey }}" `}}
        dex.authentik.clientSecret: {{` "{{ .authentik_client_secret }}" `}}
  data:
    - secretKey: admin_password
      remoteRef:
        key: argocd
        property: admin_password
    - secretKey: admin_passwordMtime
      remoteRef:
        key: argocd
        property: admin_passwordMtime
    - secretKey: server_secretkey
      remoteRef:
        key: argocd
        property: server_secretkey
    - secretKey: authentik_client_secret
      remoteRef:
        key: argocd
        property: authentik_client_secret
