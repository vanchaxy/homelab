plexio:
  controllers:
    main:
      containers:
        main:
          image:
            tag: feature-better-chart-34eb2f14

  server:
    controllers:
      main:
        containers:
          main:
            image:
              repository: registry.ivanchenko.io/plexio
            env:
              - name: CORS_ORIGIN_REGEX
                value: .*plexio.stream|.*strem.io|.*stremio.com
              - name: MATCHING_PLEX_ADDRESS
                value: 'http://plexio-prod-plex-matcher:32400'
              - name: REDIS_HOST
                value: plexio-prod-redis-master
              - name: SENTRY_DSN
                value: sentry-secret
              - name: SENTRY_ENVIRONMENT
                value: prod
              - name: SENTRY_DSN
                valueFrom:
                  secretKeyRef:
                    name: sentry-secret
                    key: SENTRY_DSN

    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
          kubernetes.io/ingress.class: nginx
          nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
          nginx.ingress.kubernetes.io/ssl-passthrough: 'true'
          nginx.ingress.kubernetes.io/use-regex: "true"
        hosts:
          - host: plexio.stream
            paths:
              - path: /api/.*
                pathType: Prefix
                service:
                  name: main
              - path: /.*json
                pathType: Prefix
                service:
                  name: main
        tls:
          - secretName: plexio-tls
            hosts:
              - plexio.stream

  frontend:
    controllers:
      main:
        containers:
          main:
            image:
              repository: registry.ivanchenko.io/plexio-frontapp

    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
          kubernetes.io/ingress.class: nginx
          nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
          nginx.ingress.kubernetes.io/ssl-passthrough: 'true'
          nginx.ingress.kubernetes.io/use-regex: "true"
        hosts:
          - host: plexio.stream
            paths:
              - path: /.*
                pathType: Prefix
                service:
                  name: main
        tls:
          - secretName: plexio-tls
            hosts:
              - plexio.stream
