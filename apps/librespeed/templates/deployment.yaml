apiVersion: apps/v1
kind: Deployment
metadata:
  name: librespeed
  labels:
    app.kubernetes.io/instance: librespeed
    app.kubernetes.io/name: librespeed
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: librespeed
      app.kubernetes.io/name: librespeed
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: librespeed
        app.kubernetes.io/name: librespeed
    spec:
      containers:
        - image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.imagePullPolicy }}
          name: librespeed
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
      nodeSelector:
        topology.kubernetes.io/region: home
