qbittorrent:
  defaultPodOptions:
    automountServiceAccountToken: false

  controllers:
    main:
      pod:
        securityContext:
          fsGroup: 568
          fsGroupChangePolicy: "OnRootMismatch"

      containers:
        main:
          image:
            repository: linuxserver/qbittorrent
            tag: 4.6.1
          securityContext:
            runAsUser: 568
            runAsGroup: 568

        gluetun:
          dependsOn: main
          image:
            repository: ghcr.io/qdm12/gluetun
            tag: v3.36.0
          env:
            VPN_SERVICE_PROVIDER: protonvpn
            VPN_PORT_FORWARDING: on
          envFrom:
            - secretRef:
                name: vpn-secret
          securityContext:
            capabilities:
              add:
                - NET_ADMIN

        port-forward:
          dependsOn: gluetun
          image:
            repository: docker.io/snoringdragon/gluetun-qbittorrent-port-manager
            tag: "1.0"
          env:
            - name: QBITTORRENT_SERVER
              value: localhost
            - name: QBITTORRENT_PORT
              value: "8080"
            - name: PORT_FORWARDED
              value: "/tmp/gluetun/forwarded_port"

  service:
    main:
      type: ClusterIP
      ports:
        http:
          port: 8080

  ingress:
    main:
      enabled: true
      ingressClassName: "nginx"
      hosts:
        - host: &host "qbittorrent.ivanchenko.io"
          paths:
            - path: /
              pathType: Prefix
              service:
                name: main
                port: http
      tls:
        - hosts:
            - *host

  persistence:
    config:
      enabled: true
      existingClaim: qbittorrent-config
      advancedMounts:
        main:
          main:
            - path: /config

    gluetun-data:
      type: emptyDir
      advancedMounts:
        main:
          gluetun:
            - path: /tmp/gluetun
          port-forward:
            - path: /tmp/gluetun
              readOnly: true