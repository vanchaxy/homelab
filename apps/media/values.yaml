qbittorrent:
  global:
    nameOverride: qbittorrent

  defaultPodOptions:
    automountServiceAccountToken: false

  controllers:
    main:
      pod:
        nodeSelector:
          topology.kubernetes.io/region: cloud
        securityContext:
          fsGroup: 568
          fsGroupChangePolicy: "OnRootMismatch"

      containers:
        main:
          image:
            repository: linuxserver/qbittorrent
            tag: 4.6.2
          env:
            PUID: 568
            PGID: 568
            TZ: Etc/UTC
            WEBUI_PORT: 8080
          securityContext:
            runAsUser: 0
            runAsGroup: 0

        gluetun:
          dependsOn: main
          image:
            repository: ghcr.io/qdm12/gluetun
            tag: v3.36.0
          env:
            VPN_SERVICE_PROVIDER: protonvpn
            VPN_PORT_FORWARDING: on
            DNS_KEEP_NAMESERVER: on
          envFrom:
            - secretRef:
                name: vpn-secret
          securityContext:
            capabilities:
              add:
                - NET_ADMIN

        port-forward:
          dependsOn: gluetun
          image:
            repository: docker.io/snoringdragon/gluetun-qbittorrent-port-manager
            tag: "1.3"
          env:
            - name: QBITTORRENT_SERVER
              value: localhost
            - name: QBITTORRENT_PORT
              value: "8080"
            - name: PORT_FORWARDED
              value: "/tmp/gluetun/forwarded_port"

        crossseed:
          dependsOn: main
          image:
            repository: crossseed/cross-seed
            tag: 5.8.5
          args:
            - search
            - '-T'
            - http://media-prowlarr:9696/3/api?apikey=0b7b43d4e25a46428ce144f6c22ef2f4
            - http://media-prowlarr:9696/4/api?apikey=0b7b43d4e25a46428ce144f6c22ef2f4
            - http://media-prowlarr:9696/5/api?apikey=0b7b43d4e25a46428ce144f6c22ef2f4
            - '-A'
            - inject
            - '--qbittorrent-url'
            - 'http://localhost:8080'
            - '--duplicate-categories'

  service:
    main:
      type: ClusterIP
      ports:
        http:
          port: 8080

  ingress:
    main:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        kubernetes.io/ingress.class: nginx
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "qBittorrent"
        gethomepage.dev/description: "Free and reliable P2P Bittorrent client"
        gethomepage.dev/group: "Dynamic"
        gethomepage.dev/icon: "qbittorrent.png"
        gethomepage.dev/widget.type: "qbittorrent"
        gethomepage.dev/widget.url: "http://media-qbittorrent.media.svc.cluster.local:8080"
        gethomepage.dev/widget.username: "username"
        gethomepage.dev/widget.password: "password"
        gethomepage.dev/pod-selector: "app.kubernetes.io/name=qbittorrent"
        nginx.ingress.kubernetes.io/auth-url: |-
          https://auth.ivanchenko.io/outpost.goauthentik.io/auth/nginx
        nginx.ingress.kubernetes.io/auth-signin: |-
          https://auth.ivanchenko.io/outpost.goauthentik.io/start
        nginx.ingress.kubernetes.io/auth-response-headers: |-
          Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
        nginx.ingress.kubernetes.io/auth-snippet: |
          proxy_set_header X-Forwarded-Host $http_host;
      ingressClassName: "nginx"
      hosts:
        - host: &host "qbittorrent.ivanchenko.io"
          paths:
            - path: /
              pathType: Prefix
              service:
                name: main
                port: http
      tls:
        - secretName: qbittorrent-tls
          hosts:
            - *host

  persistence:
    config:
      enabled: true
      size: 200Mi
      advancedMounts:
        main:
          main:
            - path: /config
          crossseed:
            - path: /torrents
              subPath: qBittorrent/BT_backup
              readOnly: true

    downloads:
      type: persistentVolumeClaim
      existingClaim: media-lib
      advancedMounts:
        main:
          main:
            - path: /data/downloads
              subPath: data/downloads

    gluetun-data:
      type: emptyDir
      advancedMounts:
        main:
          gluetun:
            - path: /tmp/gluetun
          port-forward:
            - path: /tmp/gluetun
              readOnly: true

    crossseed-config:
      enabled: true
      size: 200Mi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          crossseed:
            - path: /config

    crossseed-seeds:
      enabled: true
      size: 200Mi
      accessMode: ReadWriteOnce
      advancedMounts:
        main:
          crossseed:
            - path: /cross-seeds

