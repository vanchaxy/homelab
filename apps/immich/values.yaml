immich:
  image:
    tag: v1.84.0

  immich:
    persistence:
      library:
        existingClaim: photo-library

  postgresql:
    enabled: true

  redis:
    enabled: true

  typesense:
    enabled: true
    persistence:
      tsdata:
        enabled: true
        size: 10Gi

  web:
    persistence:
      library:
        enabled: true
        accessMode: ReadWriteMany
        size: 5Gi

  proxy:
    persistence:
      library:
        enabled: true
        accessMode: ReadWriteMany
        size: 1Gi

    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
          kubernetes.io/ingress.class: nginx
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          nginx.ingress.kubernetes.io/ssl-passthrough: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
        hosts:
          - host: immich-dev.ivanchenko.io
            paths:
              - path: "/"
        tls:
          - secretName: immich-tls
            hosts:
              - immich-dev.ivanchenko.io

  machine-learning:
    probes:
      liveness:
        spec:
          initialDelaySeconds: 90
      readiness:
        spec:
          initialDelaySeconds: 90
      startup:
        spec:
          initialDelaySeconds: 90
