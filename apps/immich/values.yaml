immich:
  image:
    # repository for renovate, not used in chart
    repository: ghcr.io/immich-app/immich-server
    tag: v1.89.0

  env:
    DB_USERNAME: "postgres"
    DB_PASSWORD: "{{ .Values.postgresql.global.postgresql.auth.postgresPassword }}"

  immich:
    persistence:
      library:
        existingClaim: photo-library

  postgresql:
    enabled: true
    global:
      postgresql:
        auth:
          postgresPassword: immich
    primary:
      persistence:
        existingClaim: data-immich-postgresql-0

  redis:
    enabled: true
    master:
      persistence:
        existingClaim: redis-data-immich-redis-master-0

  server:
    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
          kubernetes.io/ingress.class: nginx
          nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
          nginx.ingress.kubernetes.io/ssl-passthrough: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: "Immich"
          gethomepage.dev/description: "Photo and video backup solution"
          gethomepage.dev/group: "Dynamic"
          gethomepage.dev/icon: "immich.png"
          gethomepage.dev/widget.type: "immich"
          gethomepage.dev/widget.url: "http://immich-server.immich.svc.cluster.local:3001"
          gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          gethomepage.dev/pod-selector: ""
        hosts:
          - host: immich.ivanchenko.io
            paths:
              - path: "/"
        tls:
          - secretName: immich-tls
            hosts:
              - immich.ivanchenko.io

  typesense:
    enabled: true
    persistence:
      tsdata:
        enabled: true
        size: 30Gi
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/immich: enabled
    probes:
      liveness:
        spec:
          initialDelaySeconds: 300
      readiness:
        spec:
          initialDelaySeconds: 300
      startup:
        spec:
          initialDelaySeconds: 300

  machine-learning:
    probes:
      liveness:
        spec:
          initialDelaySeconds: 300
      readiness:
        spec:
          initialDelaySeconds: 300
      startup:
        spec:
          initialDelaySeconds: 300
