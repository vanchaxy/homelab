apiVersion: apps/v1
kind: Deployment
metadata:
  name: czkawka
  labels:
    app.kubernetes.io/instance: czkawka
    app.kubernetes.io/name: czkawka
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: czkawka
      app.kubernetes.io/name: czkawka
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: czkawka
        app.kubernetes.io/name: czkawka
    spec:
      containers:
        - image: jlesage/czkawka:v23.10.1
          imagePullPolicy: IfNotPresent
          name: czkawka
          ports:
            - containerPort: 5800
              protocol: TCP
              name: czkawka
          volumeMounts:
            - name: library
              mountPath: /library
            - name: dockerenv
              mountPath: /.dockerenv
      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: photo-library
        - name: dockerenv
          emptyDir: {}