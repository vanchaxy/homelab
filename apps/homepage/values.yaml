homepage:
  image:
    repository: ghcr.io/gethomepage/homepage
    tag: v0.8.2

  config:
    bookmarks:
      - Developer:
          - Github:
              - abbr: GH
                href: https://github.com/
    services:
      - My First Group:
          - My homepage:
              href: https://home.ivanchenko.io/
              description: Homepage is awesome
              icon: "homepage.png"
              namespace: homepage
              app: homepage
              pod-selector: ''

    widgets:
      - kubernetes:
          cluster:
            show: true
            cpu: true
            memory: true
            showLabel: false
          nodes:
            show: false
      - longhorn:
          expanded: true
          total: true
    kubernetes:
      mode: default
    settings:
      providers:
        longhorn:
          url: http://longhorn-frontend.longhorn-system.svc.cluster.local

  serviceAccount:
    create: true
    name: homepage

  enableRbac: true

  ingress:
    main:
      enabled: true
      annotations:
        nginx.ingress.kubernetes.io/auth-url: |-
          https://auth.ivanchenko.io/outpost.goauthentik.io/auth/nginx
        nginx.ingress.kubernetes.io/auth-signin: |-
          https://auth.ivanchenko.io/outpost.goauthentik.io/start
        nginx.ingress.kubernetes.io/auth-response-headers: |-
          Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
        nginx.ingress.kubernetes.io/auth-snippet: |
          proxy_set_header X-Forwarded-Host $http_host;
        cert-manager.io/cluster-issuer: letsencrypt
      hosts:
        - host: &host home.ivanchenko.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: home-tls
          hosts:
            - *host

  envFrom:
    - secretRef:
        name: homepage-secret
