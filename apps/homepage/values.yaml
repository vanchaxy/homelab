homepage:
  image:
    tag: v0.8.0

  config:
    bookmarks:
      - Developer:
          - Github:
              - abbr: GH
                href: https://github.com/
    services:
      - My First Group:
          - My First Service:
              href: http://localhost/
              description: Homepage is awesome

      - My Second Group:
          - My Second Service:
              href: http://localhost/
              description: Homepage is the best

      - My Third Group:
          - My Third Service:
              href: http://localhost/
              description: Homepage is 😎
    widgets:
      - kubernetes:
          cluster:
            show: true
            cpu: true
            memory: true
            showLabel: true
            label: "cluster"
          nodes:
            show: true
            cpu: true
            memory: true
            showLabel: true
      - search:
          provider: duckduckgo
          target: _blank
    kubernetes:
      mode: cluster
    settings:

  serviceAccount:
    create: true
    name: homepage

  enableRbac: true

  ingress:
    main:
      enabled: true
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "Homepage"
        gethomepage.dev/description: "Dynamically Detected Homepage"
        gethomepage.dev/group: "Dynamic"
        gethomepage.dev/icon: "homepage.png"
      hosts:
        - host: &host home.ivanchenko.io
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: home-tls
          hosts:
            - *host
