plexio:
  image:
    repository: registry.registry.svc.cluster.local:5000/plexio
    tag: "main-b8f44078"
  frontapp:
    image:
      repository: registry.registry.svc.cluster.local:5000/plexio
      tag: "main-1b012b70"
  env:
    - name: REDIS_HOST
      value: 'plexio-redis-master.plexio'
    - name: SENTRY_DSN
      valueFrom:
        secretKeyRef:
          name: plexio-secret
          key: SENTRY_DSN
    - name: SENTRY_ENVIRONMENT
      value: 'beta'
    - name: CORS_ORIGIN_REGEX
      value: '.*plexio.stream|.*strem.io|.*stremio.com'
