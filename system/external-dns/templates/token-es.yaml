apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
spec:
  target:
    name: cloudflare-api-token
    deletionPolicy: Delete
    template:
      type: Opaque
      data:
        value: {{`{{ .value }}`}}
  data:
    - secretKey: value
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: cloudflare-api-token
        property: password