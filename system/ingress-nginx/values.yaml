ingress-nginx:
  controller:
    admissionWebhooks:
      timeoutSeconds: 30
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

ingress-nginx-home:
  controller:
    ingressClassResource: nginx-home

    ingressClass: nginx-home
    electionID: ingress-controller-leader-home

    service:
      annotations:
        metallb.universe.tf/address-pool: home
        metallb.universe.tf/allow-shared-ip: home

    admissionWebhooks:
      timeoutSeconds: 30
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true